<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>照片 | 你的名字</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">YN</span>
        <span class="brand-text">你的名字</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="writing.html">写作</a>
        <a href="photos.html">照片</a>
        <a href="design.html">设计</a>
      </nav>
    </header>

    <main>
      <section class="hero hero-compact photo-hero">
        <div class="hero-copy reveal">
          <p class="eyebrow">Photo Journal</p>
          <h1>用照片保存那些一闪而过的瞬间。</h1>
          <p class="lead">这里会放我拍过的照片、路上的风景和日常见到的颜色。先给它一个简单的相册结构，之后可以继续替换成真实作品。</p>
          <div class="hero-actions">
            <a class="button button-primary" href="index.html">回到首页</a>
            <a class="button button-ghost" href="writing.html">去看写作</a>
          </div>
        </div>

        <aside class="hero-side reveal delay-1" aria-label="照片信息卡片">
          <div class="profile-card">
            <p class="micro">ALBUM</p>
            <h2>照片目录</h2>
            <p>先放一个很轻的展示结构：一张主图、几张补充图和简短说明。</p>
            <ul class="quick-facts">
              <li><span>主题</span><strong>街道 / 天空 / 光线</strong></li>
              <li><span>形式</span><strong>相册 / 网格 / 卡片</strong></li>
              <li><span>备注</span><strong>可替换为你的照片</strong></li>
            </ul>
          </div>
        </aside>
      </section>

      <section class="section reveal delay-2">
        <div class="section-head section-head-split">
          <p class="eyebrow">近期照片</p>
          <h2>相册网格</h2>
        </div>

        <div class="photo-grid">
          <figure class="photo-card photo-a">
            <img src="assets/images/news1.jpg" alt="示例照片一">
            <figcaption>样片 01 · 这是首页可替换成你的照片的位置</figcaption>
          </figure>
          <figure class="photo-card photo-placeholder photo-b photo-two">
            <div>
              <p class="photo-meta">夜晚</p>
              <h3>一盏路灯和安静的街角</h3>
              <p>这张可以以后换成你拍的夜景、街拍或旅行照片。</p>
            </div>
          </figure>
          <figure class="photo-card photo-placeholder photo-c photo-three">
            <div>
              <p class="photo-meta">天空</p>
              <h3>云层和光线的变化</h3>
            </div>
          </figure>
          <figure class="photo-card photo-placeholder photo-d photo-four">
            <div>
              <p class="photo-meta">日常</p>
              <h3>桌面、窗边和生活碎片</h3>
            </div>
          </figure>
          <figure class="photo-card photo-placeholder photo-e photo-five">
            <div>
              <p class="photo-meta">远处</p>
              <h3>走远一点再看的场景</h3>
            </div>
          </figure>
          <figure class="photo-card photo-placeholder photo-f photo-six">
            <div>
              <p class="photo-meta">归档</p>
              <h3>准备放进个人相册的照片</h3>
            </div>
          </figure>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 你的名字 · 照片页</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
